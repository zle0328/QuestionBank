name: Crawl Candidates

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: read

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawler
        run: python -m pip install -e ./crawler

      - name: Prepare source config
        id: config
        shell: bash
        env:
          CRAWLER_SOURCES_JSON: ${{ secrets.CRAWLER_SOURCES_JSON }}
        run: |
          if [ -f crawler/sources.json ]; then
            python -m json.tool crawler/sources.json > /dev/null
            echo "exists=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$CRAWLER_SOURCES_JSON" ]; then
            python -c 'import json, os; from pathlib import Path; data = json.loads(os.environ["CRAWLER_SOURCES_JSON"]); Path("crawler/sources.json").write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")'
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "crawler/sources.json and CRAWLER_SOURCES_JSON are both missing. Skipping crawl safely."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Crawl and submit candidates
        if: steps.config.outputs.exists == 'true'
        env:
          ADMIN_API_BASE_URL: ${{ secrets.ADMIN_API_BASE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: python -m question_bank_crawler.cli --config crawler/sources.json --submit
